<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BCR Constructions — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0c09;
      --orange: #e87d2b;
      --yellow: #f5c842;
      --text: #f0ece4;
      --dim: #5a5040;
      --steel: #2a2520;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      border: 20px solid transparent;
      border-image: repeating-linear-gradient(
        -45deg,
        var(--orange) 0px,
        var(--orange) 14px,
        #1a1410 14px,
        #1a1410 28px
      ) 20;
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
      z-index: 1;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    .gear-wrap {
      position: fixed;
      top: 50%;
      right: -160px;
      transform: translateY(-50%);
      width: 580px; height: 580px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }
    .gear-wrap svg { width: 100%; height: 100%; animation: spin 40s linear infinite; }

    .gear-wrap2 {
      position: fixed;
      bottom: -120px; left: -100px;
      width: 360px; height: 360px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }
    .gear-wrap2 svg { width: 100%; height: 100%; animation: spinr 28s linear infinite; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes spinr { to { transform: rotate(-360deg); } }

    .corner {
      position: fixed;
      width: 38px; height: 38px;
      border-color: var(--orange);
      border-style: solid;
      opacity: 0.5;
      z-index: 20;
    }
    .corner--tl { top: 30px; left: 30px; border-width: 2px 0 0 2px; }
    .corner--tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
    .corner--bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
    .corner--br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }

    .scene {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .brand-icon {
      width: 50px; height: 50px;
      border: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .brand-icon::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(232,125,43,0.25);
    }
    .brand-icon svg { width: 28px; height: 28px; }

    .brand-name .bcr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--orange);
      line-height: 1;
      text-align: left;
    }
    .brand-name .full {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-top: 3px;
      text-align: left;
    }

    .label-line {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }
    .label-line::before, .label-line::after {
      content: '';
      width: 60px; height: 1px;
      background: var(--steel);
    }
    .label-text {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: var(--orange);
      text-transform: uppercase;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4.5rem, 13vw, 11rem);
      line-height: 0.9;
      letter-spacing: 0.03em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.7s;
    }
    .title .highlight {
      color: var(--orange);
      display: block;
    }

    .accent-bar {
      width: 100px; height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      margin: 30px auto;
      opacity: 0;
      transform-origin: left;
      animation: expandWidth 0.7s ease forwards 1.1s;
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
      line-height: 2.2;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.3s;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 44px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.6s;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange);
      animation: blink 1.6s ease-in-out infinite;
    }

    .status-text {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .bottom-tag {
      position: fixed;
      bottom: 36px; right: 44px;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.9s;
      z-index: 20;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandWidth {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    @media (max-width: 500px) {
      body::before { border-width: 12px; }
      .corner { width: 24px; height: 24px; }
      .corner--tl, .corner--tr { top: 20px; }
      .corner--bl, .corner--br { bottom: 20px; }
      .corner--tl, .corner--bl { left: 20px; }
      .corner--tr, .corner--br { right: 20px; }
      .bottom-tag { display: none; }
    }
  </style>
</head>
<body>

  <div class="scanlines"></div>

  <div class="gear-wrap">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#e87d2b" d="M43.5 5h13l2 10a33 33 0 0 1 8.5 3.5l9-5.5 9.2 9.2-5.5 9A33 33 0 0 1 83.5 40l10 2v13l-10 2a33 33 0 0 1-3.8 8.5l5.5 9-9.2 9.2-9-5.5A33 33 0 0 1 58.5 81l-2 10h-13l-2-10a33 33 0 0 1-8.5-3.8l-9 5.5-9.2-9.2 5.5-9A33 33 0 0 1 16.5 56l-10-2V41l10-2a33 33 0 0 1 3.8-8.5l-5.5-9 9.2-9.2 9 5.5A33 33 0 0 1 41.5 15l2-10zm6.5 28a17 17 0 1 0 0 34 17 17 0 0 0 0-34z"/>
    </svg>
  </div>
  <div class="gear-wrap2">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#e87d2b" d="M43.5 5h13l2 10a33 33 0 0 1 8.5 3.5l9-5.5 9.2 9.2-5.5 9A33 33 0 0 1 83.5 40l10 2v13l-10 2a33 33 0 0 1-3.8 8.5l5.5 9-9.2 9.2-9-5.5A33 33 0 0 1 58.5 81l-2 10h-13l-2-10a33 33 0 0 1-8.5-3.8l-9 5.5-9.2-9.2 5.5-9A33 33 0 0 1 16.5 56l-10-2V41l10-2a33 33 0 0 1 3.8-8.5l-5.5-9 9.2-9.2 9 5.5A33 33 0 0 1 41.5 15l2-10zm6.5 28a17 17 0 1 0 0 34 17 17 0 0 0 0-34z"/>
    </svg>
  </div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="scene">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 17h18v2H3v-2z" fill="#e87d2b"/>
          <path d="M12 3a9 9 0 0 0-9 9h2a7 7 0 0 1 14 0h2a9 9 0 0 0-9-9z" fill="#e87d2b"/>
          <path d="M11 7v5h2V7h-2z" fill="#f5c842"/>
        </svg>
      </div>
      <div class="brand-name">
        <div class="bcr">BCR</div>
        <div class="full">Constructions</div>
      </div>
    </div>

    <div class="label-line">
      <span class="label-text">Site Status</span>
    </div>

    <h1 class="title">
      Under<br>
      <span class="highlight">Construction</span>
    </h1>

    <div class="accent-bar"></div>

    <p class="subtitle">
      Our new website is being built.<br>
      We'll be ready to serve you soon.
    </p>

    <div class="status-row">
      <div class="dot"></div>
      <span class="status-text">Work in progress — check back soon</span>
    </div>

  </div>

  <div class="bottom-tag">BCR Constructions &copy; 2026</div>

</body>
</html>
